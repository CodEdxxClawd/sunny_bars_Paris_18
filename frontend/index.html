<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Sunny Bars — 18e</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5b700">
<link rel="stylesheet" href="/static/vendor/maplibre-gl.css?v=4">
<style>
  :root {
    --accent: #f5b700;
    --ink: #2b2f38;
    --muted: #6b7280;
    --card: rgba(255, 255, 255, 0.72);
    --card-border: rgba(0, 0, 0, 0.06);
    --bg: #faf7f0;
    --input-bg: rgba(255,255,255,.8);
    --popup-bg: #ffffff;
    --popup-divider: #f1efe9;
    --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 1px 0 rgba(255,255,255,.6) inset;
    --shadow-sm: 0 4px 12px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #eceef2;
      --muted: #9aa3b2;
      --card: rgba(28, 32, 42, 0.72);
      --card-border: rgba(255, 255, 255, 0.08);
      --bg: #14171e;
      --input-bg: rgba(40,44,56,.8);
      --popup-bg: #1c2028;
      --popup-divider: rgba(255,255,255,.06);
      --shadow-lg: 0 12px 32px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04) inset;
      --shadow-sm: 0 4px 12px rgba(0,0,0,.35);
    }
  }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif; color: var(--ink); -webkit-tap-highlight-color: transparent; }
  body { overscroll-behavior: none; }
  button, select, input[type="checkbox"], .btn, .rf-radio, .report-link { touch-action: manipulation; }
  #map { position: absolute; inset: 0; }
  header {
    position: absolute;
    top: calc(12px + env(safe-area-inset-top));
    left: calc(12px + env(safe-area-inset-left));
    right: calc(12px + env(safe-area-inset-right));
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--card);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    z-index: 1000;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  header label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  input[type="datetime-local"], input[type="search"], select, button {
    font: inherit; font-size: 13px; padding: 6px 10px;
    border: 1px solid var(--card-border); border-radius: 8px;
    background: var(--input-bg); color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, button:focus { outline: none;
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,183,0,.2); }
  button { cursor: pointer; font-weight: 500; }
  button:hover { filter: brightness(1.05); }
  #stats { font-size: 12px; color: var(--muted); margin-left: auto; }
  #sheetToggle { display: none; }
  #sheetBackdrop { display: none; }
  .search-wrap { position: relative; }
  #search { width: 220px; }
  #suggest {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--popup-bg); border: 1px solid var(--card-border); border-radius: 10px;
    max-height: 280px; overflow-y: auto; z-index: 2000;
    box-shadow: var(--shadow-sm); display: none; overflow: hidden;
    color: var(--ink);
  }
  #suggest div { padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--popup-divider); }
  #suggest div:last-child { border-bottom: none; }
  #suggest div:hover, #suggest div.active { background: rgba(245,183,0,.18); }
  #suggest .kind { color: var(--muted); font-size: 11px; float: right; text-transform: uppercase; letter-spacing: .04em; }
  #weather {
    font-size: 12px; padding: 5px 12px; border-radius: 999px;
    background: rgba(180,200,220,.25); color: var(--ink); white-space: nowrap; font-weight: 500;
  }
  #weather.warn { background: rgba(253,180,100,.28); color: #c28044; }
  #weather.bad { background: rgba(240,90,90,.28); color: #e27373; }
  @media (prefers-color-scheme: light) {
    #weather.warn { background: #fde8d4; color: #7a3b00; }
    #weather.bad { background: #f7d3d3; color: #7a0000; }
  }
  #weather.hidden { display: none; }
  .slider-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; max-width: 360px; }
  #timeSlider { flex: 1; accent-color: var(--accent); }
  #timeLabel { font-size: 12px; color: var(--muted); min-width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
  .bar-marker {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
    box-shadow: 0 3px 10px rgba(0,0,0,.35), 0 0 0 2px #fff;
    cursor: pointer;
    transition: transform .12s;
  }
  .bar-marker:hover { transform: scale(1.12); }
  .bar-marker.unconfirmed {
    width: 22px; height: 22px; font-size: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25), 0 0 0 2px rgba(255,255,255,.85);
    opacity: .78;
  }
  .legend {
    position: absolute;
    bottom: calc(16px + env(safe-area-inset-bottom));
    left: calc(16px + env(safe-area-inset-left));
    z-index: 1000;
    background: var(--card);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--card-border); border-radius: 10px;
    padding: 10px 14px; font-size: 12px; line-height: 1.7;
    box-shadow: var(--shadow-sm);
  }
  .legend .sw {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    vertical-align: -1px; margin-right: 7px;
    box-shadow: 0 0 0 2px #fff;
  }
  .legend .sw.ring { background: transparent !important; border: 2px solid #f5b700; box-shadow: none; width: 10px; height: 10px; }

  /* Popup premium */
  .maplibregl-popup.popup-premium .maplibregl-popup-tip { border-top-color: var(--popup-bg); }
  .maplibregl-popup.popup-premium .maplibregl-popup-content {
    padding: 0; border-radius: 14px; overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,.18);
    border: 1px solid var(--card-border);
    background: var(--popup-bg);
    min-width: 220px; max-width: 280px;
  }
  .popup-card { font-family: inherit; color: var(--ink); }
  .popup-head { padding: 12px 14px 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .popup-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; flex: 1; }
  .popup-badge { font-size: 16px; line-height: 1; }
  .popup-meta { font-size: 11px; color: var(--muted); padding: 0 14px 10px; border-bottom: 1px solid var(--popup-divider); letter-spacing: .01em; }
  .popup-hero { padding: 14px; text-align: center; }
  .popup-hero-metric { font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; color: var(--accent); font-variant-numeric: tabular-nums; animation: hero-fade .3s ease-out; }
  @keyframes hero-fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .popup-hero-metric.shadow { color: var(--muted); }
  .popup-hero-label { font-size: 11px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: .06em; }
  .popup-note { padding: 10px 14px 14px; font-size: 12px; color: var(--muted); text-align: center; }
  .popup-hero-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .stab-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-left: 6px; vertical-align: 2px; text-transform: uppercase; letter-spacing: .04em; }
  .stab-badge.stable { background: #e4f0dc; color: #3f6b2e; }
  .stab-badge.fugace { background: #fde3cc; color: #8a4a10; }

  /* Report form */
  .popup-footer { padding: 8px 14px 10px; border-top: 1px solid var(--popup-divider); font-size: 11px; text-align: right; }
  .popup-footer.muted { color: #6b9a6b; }
  .report-link { color: var(--muted); text-decoration: none; }
  .report-link:hover { color: var(--ink); text-decoration: underline; }
  .report-body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
  .rf-radio { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 8px 10px; border: 1px solid var(--card-border); border-radius: 8px; cursor: pointer; min-height: 36px; }
  .rf-radio:hover { background: rgba(245,183,0,.12); }
  .rf-radio input { margin: 0; }
  .rf-hint { color: var(--muted); font-size: 11px; margin-left: auto; }
  .rf-sub { display: flex; flex-direction: column; gap: 6px; margin-left: 14px; padding-left: 8px; border-left: 2px solid #f5b700; }
  .rf-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .rf-cancel, .rf-submit { padding: 7px 14px; font-size: 12px; border-radius: 8px; border: 1px solid var(--card-border); cursor: pointer; }
  .rf-cancel { background: var(--popup-bg); color: var(--muted); }
  .rf-submit { background: var(--accent); border-color: var(--accent); color: #3a2e00; font-weight: 600; }
  .rf-submit:disabled { background: rgba(128,128,128,.2); border-color: transparent; color: var(--muted); cursor: not-allowed; }
  .rf-status { font-size: 12px; text-align: center; min-height: 16px; }
  .rf-status.ok { color: #3f6b2e; }
  .rf-status.err { color: #a43a3a; }

  @media (max-width: 640px) {
    header { gap: 8px; padding: 8px 12px; flex-wrap: nowrap; }
    header h1 { font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    input[type="datetime-local"], input[type="search"], select, button {
      font-size: 16px;
      padding: 10px 12px;
      min-height: 44px;
    }
    header label { font-size: 14px; }

    /* Hide desktop controls in header on mobile — they move to sheet */
    header .ctrl-when, header .ctrl-now, header #filter, header .ctrl-stable, header .search-wrap, header #stats { display: none; }
    header #weather { font-size: 11px; padding: 4px 9px; }

    /* Settings toggle — visible on mobile */
    #sheetToggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; min-height: 40px; padding: 0; font-size: 20px; border-radius: 10px;
      background: var(--input-bg); border: 1px solid var(--card-border); color: var(--ink);
    }

    /* Bottom sheet */
    #sheet {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      z-index: 2500;
      background: var(--popup-bg);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-top-left-radius: 18px; border-top-right-radius: 18px;
      box-shadow: 0 -8px 30px rgba(0,0,0,.18);
      padding: 6px 16px calc(20px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.2,.7,.2,1);
      display: flex; flex-direction: column; gap: 12px;
      max-height: 80vh; overflow-y: auto;
    }
    #sheet.open { transform: translateY(0); }
    #sheet .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px; background: #d0ccc3;
      margin: 6px auto 8px;
    }
    #sheet .sheet-row { display: flex; flex-direction: column; gap: 6px; }
    #sheet .sheet-row > label { font-size: 12px; color: var(--muted); font-weight: 500; }
    #sheet .search-wrap { display: block; }
    #sheet #search { width: 100%; box-sizing: border-box; }
    #sheet #suggest { position: absolute; }
    #sheet .ctrl-stable { display: flex; align-items: center; gap: 8px; font-size: 15px; color: var(--ink); }
    #sheet #filter, #sheet #when { width: 100%; box-sizing: border-box; }
    #sheet .sheet-stats { font-size: 12px; color: var(--muted); text-align: center; padding-top: 4px; border-top: 1px solid #f1efe9; }
    #sheet .sheet-now { align-self: stretch; }

    #sheetBackdrop {
      display: block;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 2400;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #sheetBackdrop.open { opacity: 1; pointer-events: auto; }

    /* Floating time bar at bottom */
    header .slider-wrap { display: none; }
    #timebar {
      position: fixed;
      left: calc(12px + env(safe-area-inset-left));
      right: calc(12px + env(safe-area-inset-right));
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 1500;
      background: var(--card);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    #timebar .tb-label { font-size: 13px; color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; min-width: 48px; }
    #timebar input[type="range"] {
      flex: 1; accent-color: var(--accent); height: 44px; margin: 0;
    }

    /* Legend: collapsed button on mobile, above timebar */
    .legend {
      bottom: calc(78px + env(safe-area-inset-bottom));
      font-size: 11px; padding: 0;
      line-height: 1.5;
      cursor: pointer;
      overflow: hidden;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: width .25s, height .25s, padding .25s;
    }
    .legend::before { content: 'ℹ️'; font-size: 18px; }
    .legend.open { width: auto; height: auto; padding: 10px 14px; }
    .legend.open::before { display: none; }
    .legend > div { display: none; }
    .legend.open > div { display: block; }

    .rf-radio { min-height: 44px; font-size: 15px; }
    .rf-cancel, .rf-submit { min-height: 44px; font-size: 14px; padding: 10px 16px; }
    .btn { min-height: 44px; font-size: 14px; padding: 10px 14px; }
    .report-link { padding: 6px 0; display: inline-block; }
  }

  /* Bar sheet (mobile popup) */
  @media (max-width: 640px) {
    #barSheet {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      z-index: 2500;
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border-top-left-radius: 18px; border-top-right-radius: 18px;
      box-shadow: 0 -8px 30px rgba(0,0,0,.18);
      padding: 4px 0 calc(12px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.2,.7,.2,1);
      display: flex; flex-direction: column;
      max-height: 82vh; overflow-y: auto;
    }
    #barSheet.open { transform: translateY(0); }
    #barSheet .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: #d0ccc3; margin: 6px auto 4px; flex-shrink: 0; }
    #barSheetBody .popup-card { border-radius: 0; border: none; box-shadow: none; min-width: 0; max-width: none; }
    #barSheetBody .popup-head { padding: 14px 18px 8px; }
    #barSheetBody .popup-title { font-size: 17px; }
    #barSheetBody .popup-meta { padding: 0 18px 12px; font-size: 13px; }
    #barSheetBody .popup-hero-metric { font-size: 40px; }
    #barSheetBody .popup-hero { padding: 18px; }
    #barSheetBody .report-body { padding: 14px 18px 18px; }
    #barSheetBody .popup-footer { padding: 10px 18px 14px; font-size: 13px; text-align: center; }
    #barSheetBackdrop {
      display: block;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 2400;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #barSheetBackdrop.open { opacity: 1; pointer-events: auto; }
  }

  /* Desktop : hide sheet / timebar / toggle entirely */
  @media (min-width: 641px) {
    #sheet, #sheetBackdrop, #barSheet, #barSheetBackdrop { display: none !important; }
    #timebar { display: none !important; }
    #sheetToggle { display: none !important; }
  }
</style>
</head>
<body>
<header>
  <h1>☀️ Sunny Bars · 18e</h1>
  <label class="ctrl-when">Quand <input id="when" type="datetime-local"></label>
  <button id="now" class="ctrl-now">maintenant</button>
  <span class="slider-wrap">
    <input id="timeSlider" type="range" min="0" max="1" step="1" value="0" disabled>
    <span id="timeLabel">--:--</span>
  </span>
  <select id="filter">
    <option value="all">Tout</option>
    <option value="bar_cafe">Bars & cafés</option>
    <option value="restaurant">Restaurants</option>
  </select>
  <label class="ctrl-stable"><input id="stableOnly" type="checkbox"> Stable (&gt;45 min)</label>
  <span class="search-wrap">
    <input id="search" type="search" placeholder="rue, café, resto…" autocomplete="off">
    <div id="suggest"></div>
  </span>
  <span id="weather" class="hidden"></span>
  <span id="stats"></span>
  <button id="sheetToggle" aria-label="réglages">⚙</button>
</header>
<div id="map"></div>
<div id="sheetBackdrop"></div>
<div id="sheet" role="dialog" aria-label="réglages">
  <div class="sheet-handle"></div>
  <div id="sheetSlots"></div>
</div>
<div id="timebar"></div>
<div id="barSheetBackdrop"></div>
<div id="barSheet" role="dialog" aria-label="détail bar">
  <div class="sheet-handle"></div>
  <div id="barSheetBody"></div>
</div>
<div class="legend">
  <div><span class="sw" style="background:#f5b700"></span>terrasse confirmée, au soleil</div>
  <div><span class="sw" style="background:#4a5b6b"></span>terrasse confirmée, à l'ombre</div>
  <div><span class="sw ring"></span>terrasse probable (non taguée)</div>
</div>
<script src="/static/vendor/maplibre-gl.js?v=5"></script>
<script src="/static/app.js?v=19"></script>
</body>
</html>
